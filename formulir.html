<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }

  <script>
    function toggleSewaSatuan() {
      const sewa = document.getElementById('sewa').value;
      const sewaSatuanWrapper = document.getElementById('sewa-satuan-wrapper');
      const sewaSatuan = document.getElementById('sewa-satuan');
      if (sewa === 'Sewa Satuan') {
        sewaSatuanWrapper.style.display = 'block';
        sewaSatuan.setAttribute('required', 'required');
      } else {
        sewaSatuanWrapper.style.display = 'none';
        sewaSatuan.removeAttribute('required');
        sewaSatuan.value = '';
      }
    }

    function sendToWA() {
      const nama = document.getElementById('nama').value;
      const alamat = document.getElementById('alamat').value;
      const sewa = document.getElementById('sewa').value;
      const sewaSatuan = document.getElementById('sewa-satuan').value;
      const ambil = document.getElementById('ambil').value;
      const kembali = document.getElementById('kembali').value;
      const jaminan = document.getElementById('jaminan').value;
      
      // Validation check for required fields
      if (!nama || !alamat || !sewa || !ambil || !kembali || !jaminan) {
        alert('Harap isi semua kolom yang wajib diisi!');
        return false;
      }
      if (sewa === 'Sewa Satuan' && !sewaSatuan) {
        alert('Harap pilih alat untuk Sewa Satuan!');
        return false;
      }

      let pilihanText = sewa;
      if (sewa === 'Sewa Satuan' && sewaSatuan) {
        pilihanText = `Sewa Satuan - ${sewaSatuan}`;
      }

      const text = `Halo! Saya ingin menyewa alat:%0A%0A` +
                   `• Nama: ${nama}%0A` +
                   `• Alamat: ${alamat}%0A` +
                   `• Pilihan Sewa: ${pilihanText}%0A` +
                   `• Tanggal & Jam Ambil: ${ambil}%0A` +
                   `• Tanggal & Jam Kembali: ${kembali}%0A` +
                   `• Jaminan: ${jaminan}%0A%0A` +
                   `Terima kasih!`;
      const url = `https://wa.me/6289671172929?text=${text}`;
      window.open(url, '_blank');
      return false;
    }
  </script>
